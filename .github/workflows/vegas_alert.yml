name: Vegas Tunnel Telegram Alert

on:
  schedule:
    # 每小時的 0/15/30/45 分執行一次（UTC時間；分鐘對齊在任何時區都一樣，
    # 台灣是UTC+8整點時差，不影響分鐘對齊）。GitHub Actions的排程是「盡力而為」，
    # 尖峰時段可能會延遲幾分鐘才真正執行，這是平台本身的限制。
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # 允許在GitHub網頁上手動點「Run workflow」測試

permissions:
  contents: write  # 需要寫入權限，才能把 alert_state.json 的更新結果commit回repo

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Vegas Tunnel alert scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_vegas_alert.py

      - name: Commit updated alert state (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain -- alert_state.json)" ]; then
            git add alert_state.json
            git commit -m "Update alert_state.json [skip ci]"
            git push
          else
            echo "alert_state.json 沒有變化，不需要commit。"
          fi
